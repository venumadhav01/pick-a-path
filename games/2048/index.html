<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 — Pick a Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161220; --surface:#221c30; --card:#2a2338;
    --text:#f7f1e8; --text-dim:#a89bb5;
    --amber:#ffb703; --amber-glow:#ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at 50% 0%, #2b1f10 0%, var(--bg) 60%);
    color:var(--text); font-family:'Space Grotesk',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:2rem 1rem;
  }
  .pixel{font-family:'Press Start 2P',monospace;}
  a.back{ color:var(--text-dim); text-decoration:none; font-size:0.85rem; align-self:flex-start; margin-bottom:1.5rem;}
  a.back:hover{ color:var(--amber-glow); }
  h1{ font-size:1.6rem; color:var(--amber-glow); margin-bottom:0.3rem; }
  .sub{ color:var(--text-dim); font-size:0.9rem; margin-bottom:1.5rem; text-align:center; }
  .hud{ display:flex; gap:1rem; margin-bottom:1.2rem; }
  .score-box{ background:var(--card); border-radius:8px; padding:0.6rem 1.2rem; text-align:center; min-width:90px; }
  .score-box .label{ font-size:0.65rem; color:var(--text-dim); letter-spacing:1px; }
  .score-box .val{ font-size:1.3rem; font-weight:700; color:var(--amber-glow); }
  #board{
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    background:var(--surface); padding:10px; border-radius:12px;
    width:min(90vw, 380px); aspect-ratio:1;
  }
  .cell{
    background:rgba(255,255,255,0.04); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(1rem,5vw,1.6rem); font-weight:700;
    transition:transform 0.1s ease;
  }
  .t2{background:#3a3050;color:var(--text);}
  .t4{background:#463a5c;color:var(--text);}
  .t8{background:#7a5e17;color:#fff3d6;}
  .t16{background:#94720f;color:#fff3d6;}
  .t32{background:#b3860a;color:#fff8e6;}
  .t64{background:#d99c05;color:#1a1625;}
  .t128{background:var(--amber);color:#1a1625;}
  .t256{background:var(--amber-glow);color:#1a1625;}
  .t512, .t1024, .t2048{background:#fff3d6;color:#1a1625;box-shadow:0 0 20px var(--amber-glow);}
  #msg{ margin-top:1.2rem; font-size:0.9rem; color:var(--amber-glow); min-height:1.4rem; }
  button{
    margin-top:1rem; background:var(--amber); color:#1a1625; border:none;
    padding:0.7rem 1.4rem; border-radius:8px; font-family:'Space Grotesk',sans-serif;
    font-weight:700; cursor:pointer; font-size:0.9rem;
  }
  button:hover{ background:var(--amber-glow); }
  .hint{ color:var(--text-dim); font-size:0.75rem; margin-top:1.5rem; text-align:center; }
</style>
</head>
<body>
<a class="back" href="../../index.html">← Back to hub</a>
<h1 class="pixel" style="font-size:1.1rem;">2048</h1>
<p class="sub">Slide tiles with arrow keys (or swipe). Merge to reach 2048.</p>
<div class="hud">
  <div class="score-box"><div class="label">SCORE</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">BEST</div><div class="val" id="best">0</div></div>
</div>
<div id="board"></div>
<div id="msg"></div>
<button onclick="restart()">Restart</button>
<p class="hint">Arrow keys to play · swipe on mobile</p>

<script>
let grid, score, best, over;
const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
best = parseInt(localStorage.getItem('2048-best') || '0');
bestEl.textContent = best;

function emptyGrid(){ return Array.from({length:4}, () => Array(4).fill(0)); }

function addTile(){
  const empties = [];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]===0) empties.push([r,c]);
  if(!empties.length) return;
  const [r,c] = empties[Math.floor(Math.random()*empties.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render(){
  boardEl.innerHTML = '';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const v = grid[r][c];
    const cell = document.createElement('div');
    cell.className = 'cell' + (v ? ' t'+v : '');
    cell.textContent = v || '';
    boardEl.appendChild(cell);
  }
  scoreEl.textContent = score;
  if(score > best){ best = score; localStorage.setItem('2048-best', best); bestEl.textContent = best; }
}

function slideRow(row){
  let arr = row.filter(v => v !== 0);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i] === arr[i+1]){ arr[i]*=2; score += arr[i]; arr.splice(i+1,1); }
  }
  while(arr.length < 4) arr.push(0);
  return arr;
}

function rotateGrid(g){
  const n = emptyGrid();
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) n[c][3-r] = g[r][c];
  return n;
}

function move(dir){
  if(over) return;
  let g = grid.map(r=>r.slice());
  let rotations = {left:0, up:3, right:2, down:1}[dir];
  for(let i=0;i<rotations;i++) g = rotateGrid(g);
  const before = JSON.stringify(g);
  g = g.map(slideRow);
  const after = JSON.stringify(g);
  for(let i=0;i<(4-rotations)%4;i++) g = rotateGrid(g);
  if(before !== JSON.stringify(g.map((r,ri)=>r))){/*noop*/}
  const moved = before !== after;
  grid = g;
  if(moved){ addTile(); render(); checkOver(); }
}

function checkOver(){
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    if(grid[r][c]===0) return;
    if(c<3 && grid[r][c]===grid[r][c+1]) return;
    if(r<3 && grid[r][c]===grid[r+1][c]) return;
    if(grid[r][c]===2048){ msgEl.textContent = '🎉 You reached 2048!'; over=true; return; }
  }
  msgEl.textContent = 'Game over — no moves left.';
  over = true;
}

function restart(){
  grid = emptyGrid(); score = 0; over = false; msgEl.textContent = '';
  addTile(); addTile(); render();
}

window.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
});

let touchX, touchY;
boardEl.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
boardEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if(Math.abs(dx) > Math.abs(dy)){ move(dx > 30 ? 'right' : dx < -30 ? 'left' : ''); }
  else{ move(dy > 30 ? 'down' : dy < -30 ? 'up' : ''); }
});

restart();
</script>
</body>
</html>
