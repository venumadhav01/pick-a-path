<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake, Remixed — Pick a Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#161220; --surface:#221c30; --text:#f7f1e8; --text-dim:#a89bb5; --amber:#ffb703; --amber-glow:#ffd166; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem;
  }
  .pixel{font-family:'Press Start 2P',monospace;}
  a.back{ color:var(--text-dim); text-decoration:none; font-size:0.85rem; align-self:flex-start; margin-bottom:1.5rem;}
  a.back:hover{ color:var(--amber-glow); }
  h1{ font-size:1.1rem; color:var(--amber-glow); margin-bottom:0.3rem; }
  .sub{ color:var(--text-dim); font-size:0.9rem; margin-bottom:1rem; text-align:center; }
  .hud{ display:flex; gap:1.5rem; margin-bottom:1rem; font-size:0.9rem; }
  .hud span{ color:var(--amber-glow); font-weight:700; }
  canvas{ background:var(--surface); border-radius:10px; touch-action:none; max-width:95vw; }
  #msg{ margin-top:1rem; font-size:0.95rem; color:var(--amber-glow); min-height:1.4rem; text-align:center; }
  button{
    margin-top:0.8rem; background:var(--amber); color:#1a1625; border:none;
    padding:0.7rem 1.4rem; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.9rem;
  }
  button:hover{ background:var(--amber-glow); }
  .hint{ color:var(--text-dim); font-size:0.75rem; margin-top:1.2rem; text-align:center; max-width:340px; }
</style>
</head>
<body>
<a class="back" href="../../index.html">← Back to hub</a>
<h1 class="pixel">SNAKE, REMIXED</h1>
<p class="sub">Gold food grows you. Purple food is a power-up. Theme shifts every 5 eaten.</p>
<div class="hud"><div>Score: <span id="score">0</span></div><div>Length: <span id="len">3</span></div></div>
<canvas id="c" width="360" height="360"></canvas>
<div id="msg"></div>
<button onclick="restart()">Restart</button>
<p class="hint">Arrow keys / WASD to steer · swipe on mobile</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const grid = 18, cells = canvas.width/grid;
const scoreEl = document.getElementById('score'), lenEl = document.getElementById('len'), msgEl = document.getElementById('msg');

const themes = [
  {bg:'#221c30', snake:'#ffb703', food:'#5eead4'},
  {bg:'#241531', snake:'#5eead4', food:'#ffb703'},
  {bg:'#2a1830', snake:'#ff6b6b', food:'#ffd166'},
  {bg:'#182a2b', snake:'#8bf5e4', food:'#ff6b6b'},
];
let themeIdx = 0;

let snake, dir, nextDir, food, power, powerActive, speed, loopId, score, eaten, over;

function reset(){
  snake = [{x:8,y:9},{x:7,y:9},{x:6,y:9}];
  dir = {x:1,y:0}; nextDir = dir;
  score = 0; eaten = 0; over = false; speed = 130; powerActive = null;
  themeIdx = 0;
  placeFood(); placePower();
  scoreEl.textContent = 0; lenEl.textContent = 3; msgEl.textContent = '';
}

function placeFood(){
  food = randCell();
}
function placePower(){
  power = Math.random() < 0.5 ? randCell() : null;
}
function randCell(){
  let c;
  do{ c = {x: Math.floor(Math.random()*cells), y: Math.floor(Math.random()*cells)}; }
  while(snake.some(s => s.x===c.x && s.y===c.y));
  return c;
}

function tick(){
  if(over) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if(head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells || snake.some(s => s.x===head.x && s.y===head.y)){
    over = true;
    msgEl.textContent = `Game over — length ${snake.length}. Press Restart.`;
    return;
  }
  snake.unshift(head);

  if(head.x === food.x && head.y === food.y){
    score += 10; eaten++;
    scoreEl.textContent = score; lenEl.textContent = snake.length;
    placeFood();
    if(eaten % 5 === 0){ themeIdx = (themeIdx+1) % themes.length; }
    if(eaten % 5 === 0 && speed > 60) speed -= 8;
  } else if(power && head.x === power.x && head.y === power.y){
    score += 25;
    scoreEl.textContent = score;
    const roll = Math.random();
    if(roll < 0.5){ speed = Math.max(60, speed - 30); msgEl.textContent = '⚡ Speed boost!'; }
    else{ snake.splice(Math.max(3, snake.length-3)); msgEl.textContent = '✂️ Trimmed down!'; lenEl.textContent = snake.length; }
    setTimeout(()=>{ if(!over) msgEl.textContent=''; }, 1200);
    placePower();
  } else {
    snake.pop();
  }

  draw();
  loopId = setTimeout(tick, speed);
}

function draw(){
  const th = themes[themeIdx];
  ctx.fillStyle = th.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = th.food;
  ctx.fillRect(food.x*grid+2, food.y*grid+2, grid-4, grid-4);

  if(power){
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.arc(power.x*grid+grid/2, power.y*grid+grid/2, grid/2-2, 0, Math.PI*2);
    ctx.fill();
  }

  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? th.snake : th.snake + 'cc';
    ctx.fillRect(s.x*grid+1, s.y*grid+1, grid-2, grid-2);
  });
}

function restart(){
  clearTimeout(loopId);
  reset();
  draw();
  loopId = setTimeout(tick, speed);
}

const keyMap = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
};
window.addEventListener('keydown', e => {
  const d = keyMap[e.key];
  if(d && !(d.x === -dir.x && d.y === -dir.y)){ nextDir = d; e.preventDefault(); }
});

let tX, tY;
canvas.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tX, dy = e.changedTouches[0].clientY - tY;
  let d;
  if(Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if(!(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
});

restart();
</script>
</body>
</html>
