<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick a Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161220;
    --surface:#221c30;
    --card:#2a2338;
    --text:#f7f1e8;
    --text-dim:#a89bb5;
    --amber:#ffb703;
    --amber-glow:#ffd166;
    --amber-dim:#7a5e17;
    --cyan:#5eead4;
    --cyan-glow:#8bf5e4;
    --cyan-dim:#1f4d49;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk',sans-serif;
    overflow-x:hidden;
  }
  .pixel{font-family:'Press Start 2P',monospace;}

  /* ---------- HOME SPLIT SCREEN ---------- */
  #home{
    position:relative;
    height:100vh;
    display:flex;
    flex-direction:row;
  }
  .panel{
    position:relative;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    overflow:hidden;
    transition:flex 0.7s cubic-bezier(.77,0,.18,1), opacity 0.6s ease;
  }
  .panel-inner{
    position:relative;
    z-index:2;
    text-align:center;
    padding:2rem;
  }
  .panel-label{
    font-size:clamp(1.2rem,3vw,2.4rem);
    letter-spacing:2px;
    margin-bottom:1rem;
    text-shadow:0 0 18px currentColor;
  }
  .panel-sub{
    font-size:0.95rem;
    color:var(--text-dim);
    max-width:340px;
    margin:0 auto;
    line-height:1.5;
  }
  .panel-tap{
    margin-top:2rem;
    font-size:0.75rem;
    letter-spacing:1px;
    opacity:0.6;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.35;}
    50%{opacity:0.9;}
  }

  /* GAMES side — ember flow-field canvas sits behind content */
  .games{
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(255,183,3,0.10) 0%, transparent 70%),
      radial-gradient(ellipse at 50% 100%, #2b1f10 0%, #161220 65%);
    color:var(--amber);
  }
  .games .panel-label{ color:var(--amber-glow); }
  .games .panel-tap{color:var(--amber);}

  /* WEB side — circuit-trace canvas sits behind content */
  .web{
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(94,234,212,0.09) 0%, transparent 70%),
      var(--bg);
    color:var(--cyan);
  }
  .web .panel-label{ color:var(--cyan-glow); }
  .web .panel-tap{color:var(--cyan);}

  .panel canvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    z-index:1;
  }

  /* seam divider */
  .seam{
    position:absolute; top:0; bottom:0; left:50%;
    width:2px;
    background:linear-gradient(180deg, transparent, var(--text-dim), transparent);
    z-index:3;
    transform:translateX(-1px);
    pointer-events:none;
    transition:opacity 0.4s ease;
  }

  .panel:hover .panel-label{ transform:scale(1.05); }
  .panel-label{transition:transform 0.3s ease;}

  .panel.expanded{ flex:1 1 100%; }
  .panel.collapsed{ flex:0 0 0%; opacity:0; pointer-events:none; }

  /* ---------- LIST VIEW ---------- */
  #list{
    display:none;
    min-height:100vh;
    padding:4rem 1.5rem 4rem;
  }
  #list.active{ display:block; }
  #home.hidden{ display:none; }

  .list-wrap{
    max-width:820px;
    margin:0 auto;
  }
  .back-btn{
    background:none;
    border:1px solid var(--text-dim);
    color:var(--text);
    padding:0.6rem 1.1rem;
    border-radius:6px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.85rem;
    cursor:pointer;
    margin-bottom:2.5rem;
    transition:border-color 0.2s ease, color 0.2s ease;
  }
  .back-btn:hover{ color:var(--accent); border-color:var(--accent); }

  .list-title{
    font-size:clamp(1.4rem,3vw,2rem);
    letter-spacing:1px;
    margin-bottom:0.6rem;
  }
  .list-kicker{
    font-size:0.75rem;
    letter-spacing:2px;
    color:var(--accent);
    margin-bottom:0.5rem;
    display:block;
  }
  .list-desc{
    color:var(--text-dim);
    margin-bottom:2.5rem;
    max-width:520px;
    line-height:1.5;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:1.1rem;
  }
  .card{
    background:linear-gradient(160deg, var(--card), var(--surface));
    border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;
    padding:1.5rem;
    position:relative;
    overflow:hidden;
    transition:transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--accent);
    opacity:0.75;
  }
  .card:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
    box-shadow:0 12px 28px -12px var(--accent);
  }
  .card-num{
    font-family:'Press Start 2P',monospace;
    font-size:0.65rem;
    color:var(--accent);
    opacity:0.7;
    display:block;
    margin-bottom:0.8rem;
  }
  .card h3{
    font-size:1.05rem;
    margin-bottom:0.5rem;
  }
  .card p{
    font-size:0.85rem;
    color:var(--text-dim);
    line-height:1.5;
  }
  .card-status{
    display:inline-block;
    margin-top:1rem;
    font-size:0.7rem;
    letter-spacing:1px;
    padding:0.3rem 0.6rem;
    border-radius:4px;
    background:rgba(255,255,255,0.05);
    color:var(--text-dim);
  }

  #list.games-theme{ --accent:var(--amber); }
  #list.web-theme{ --accent:var(--cyan); }

  @media (max-width:640px){
    #home{ flex-direction:column; }
    .seam{ display:none; }
  }
</style>
</head>
<body>

<div id="home">
  <div class="seam"></div>
  <div class="panel games" id="panel-games" onclick="openList('games')">
    <canvas id="canvas-games"></canvas>
    <div class="panel-inner">
      <div class="panel-label pixel">GAMES</div>
      <div class="panel-sub">Quick, replayable, built to be played in a browser tab.</div>
      <div class="panel-tap pixel">▶ INSERT COIN</div>
    </div>
  </div>
  <div class="panel web" id="panel-web" onclick="openList('web')">
    <canvas id="canvas-web"></canvas>
    <div class="panel-inner">
      <div class="panel-label pixel">WEB PAGES</div>
      <div class="panel-sub">Small useful sites you'd actually bookmark.</div>
      <div class="panel-tap pixel">▶ OPEN WORKSHOP</div>
    </div>
  </div>
</div>

<div id="list">
  <div class="list-wrap">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <span class="list-kicker pixel" id="list-kicker"></span>
    <h2 class="list-title" id="list-title"></h2>
    <p class="list-desc" id="list-desc"></p>
    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
const DATA = {
  games: {
    kicker: "GAME MODE",
    title: "Pick a game to play",
    desc: "All five run purely in the browser — no backend, no login.",
    items: [
      { name:"2048 Clone", desc:"Merge tiles to reach 2048. Classic grid logic, smooth slide animations.", href:"games/2048/index.html" },
      { name:"Snake, Remixed", desc:"Snake with power-ups and shifting themes as your score climbs.", href:"games/snake/index.html" },
      { name:"Memory Match", desc:"Flip-and-match card game with an arcade icon set.", href:"games/memory/index.html" },
      { name:"Endless Runner", desc:"Canvas-based dodge-and-jump game, dinosaur-game style.", href:"games/runner/index.html" },
      { name:"Trivia Sprint", desc:"Timed quiz game with a scoreboard and retro-gaming questions.", href:"games/trivia/index.html" }
    ]
  },
  web: {
    kicker: "BUILD MODE",
    title: "Pick a page to open",
    desc: "Each is a self-contained site you could genuinely use day to day.",
    items: [
      { name:"Personal Portfolio", desc:"Projects, resume, and contact info in one clean single-pager.", href:"web/portfolio/index.html" },
      { name:"Recipe Planner", desc:"Browse recipes, save favorites, filter by what's in your fridge.", href:"web/recipe-planner/index.html" },
      { name:"Weather Dashboard", desc:"Live weather via a free, key-free API.", href:"web/weather/index.html" },
      { name:"Movie Discovery", desc:"Search and browse films with posters and ratings via OMDb.", href:"web/movies/index.html" },
      { name:"Random Idea Generator", desc:"One button, one surprising idea — seeded shuffle, no repeats.", href:"web/idea-generator/index.html" }
    ]
  }
};

function openList(kind){
  const home = document.getElementById('home');
  const list = document.getElementById('list');
  const chosen = document.getElementById('panel-' + kind);
  const other = document.getElementById('panel-' + (kind === 'games' ? 'web' : 'games'));

  chosen.classList.add('expanded');
  other.classList.add('collapsed');

  setTimeout(() => {
    home.classList.add('hidden');
    renderList(kind);
    list.className = 'active ' + kind + '-theme';
    window.scrollTo(0,0);
  }, 550);
}

function renderList(kind){
  const d = DATA[kind];
  document.getElementById('list-kicker').textContent = d.kicker;
  document.getElementById('list-title').textContent = d.title;
  document.getElementById('list-desc').textContent = d.desc;
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = d.items.map((item, i) => `
    <a class="card" href="${item.href}" style="text-decoration:none;color:inherit;display:block;">
      <span class="card-num pixel">0${i+1}</span>
      <h3>${item.name}</h3>
      <p>${item.desc}</p>
      <span class="card-status" style="background:rgba(255,255,255,0.08);color:var(--accent);">Open →</span>
    </a>
  `).join('');
}

function goHome(){
  const home = document.getElementById('home');
  const list = document.getElementById('list');
  const panelGames = document.getElementById('panel-games');
  const panelWeb = document.getElementById('panel-web');

  list.className = '';
  home.classList.remove('hidden');
  panelGames.classList.remove('expanded','collapsed');
  panelWeb.classList.remove('expanded','collapsed');
}

/* ---------- GENERATIVE SIGNATURES ---------- */
/* Seeded PRNG (mulberry32) so each load is reproducible from SEED */
const SEED = 90210;
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setupCanvas(canvas){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const resize = () => {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  };
  resize();
  window.addEventListener('resize', resize);
  return canvas.getContext('2d');
}

/* Games side: ember flow-field. Particles drift on layered sine-noise,
   warm and slow, echoing marquee heat-shimmer. */
function startEmbers(){
  const canvas = document.getElementById('canvas-games');
  const ctx = setupCanvas(canvas);
  const rand = mulberry32(SEED);
  const count = 46;
  const embers = Array.from({length: count}, () => ({
    x: rand(), y: rand(),
    phase: rand() * Math.PI * 2,
    speed: 0.15 + rand() * 0.35,
    size: 1 + rand() * 2.2,
    drift: 0.4 + rand() * 0.6
  }));
  let t = 0;
  let raf;
  function frame(){
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    t += 0.006;
    for(const e of embers){
      const nx = e.x + Math.sin(t*e.speed + e.phase) * 0.02 * e.drift;
      const ny = (e.y - t*0.02*e.speed) % 1;
      const py = ny < 0 ? ny + 1 : ny;
      const px = ((nx % 1) + 1) % 1;
      const glow = 0.35 + 0.65 * Math.sin(t*2 + e.phase)*0.5+0.5;
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,183,3,${0.25*glow})`;
      ctx.arc(px*w, py*h, e.size*dprSafe(canvas), 0, Math.PI*2);
      ctx.fill();
    }
    if(!reduceMotion) raf = requestAnimationFrame(frame);
  }
  function dprSafe(c){ return Math.min(window.devicePixelRatio||1,2); }
  frame();
  if(reduceMotion) return; // single static frame only
  document._embersRaf = raf;
}

/* Web side: circuit-trace network. Nodes on a loose grid, connected to
   nearest neighbors, current pulses traveling along traces in sequence. */
function startCircuit(){
  const canvas = document.getElementById('canvas-web');
  const ctx = setupCanvas(canvas);
  const rand = mulberry32(SEED + 7);
  const cols = 6, rows = 8;
  const nodes = [];
  for(let cx=0; cx<cols; cx++){
    for(let cy=0; cy<rows; cy++){
      nodes.push({
        x: (cx+0.5)/cols + (rand()-0.5)*0.06,
        y: (cy+0.5)/rows + (rand()-0.5)*0.06
      });
    }
  }
  // connect each node to its nearest right/below neighbor (grid-ish traces)
  const edges = [];
  for(let cx=0; cx<cols; cx++){
    for(let cy=0; cy<rows; cy++){
      const i = cx*rows+cy;
      if(cx < cols-1) edges.push([i, (cx+1)*rows+cy]);
      if(cy < rows-1) edges.push([i, cx*rows+(cy+1)]);
    }
  }
  const pulses = edges.map((e,i) => ({
    edge: e,
    offset: rand(),
    speed: 0.15 + rand()*0.25,
    active: rand() > 0.35
  }));
  let t = 0;
  function frame(){
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    t += 0.008;
    // static traces
    ctx.strokeStyle = 'rgba(94,234,212,0.12)';
    ctx.lineWidth = 1;
    for(const [a,b] of edges){
      ctx.beginPath();
      ctx.moveTo(nodes[a].x*w, nodes[a].y*h);
      ctx.lineTo(nodes[b].x*w, nodes[b].y*h);
      ctx.stroke();
    }
    // node dots
    ctx.fillStyle = 'rgba(94,234,212,0.35)';
    for(const n of nodes){
      ctx.beginPath();
      ctx.arc(n.x*w, n.y*h, 1.6, 0, Math.PI*2);
      ctx.fill();
    }
    // traveling pulses
    for(const p of pulses){
      if(!p.active) continue;
      const [a,b] = p.edge;
      const prog = (t*p.speed + p.offset) % 1;
      const px = nodes[a].x + (nodes[b].x - nodes[a].x)*prog;
      const py = nodes[a].y + (nodes[b].y - nodes[a].y)*prog;
      const glow = ctx.createRadialGradient(px*w,py*h,0,px*w,py*h,8);
      glow.addColorStop(0,'rgba(139,245,228,0.9)');
      glow.addColorStop(1,'rgba(139,245,228,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px*w, py*h, 8, 0, Math.PI*2);
      ctx.fill();
    }
    if(!reduceMotion) requestAnimationFrame(frame);
  }
  frame();
}

startEmbers();
startCircuit();
</script>

</body>
</html>
