<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard — Pick a Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#161220; --surface:#221c30; --card:#2a2338; --text:#f7f1e8; --text-dim:#a89bb5; --cyan:#5eead4; --cyan-glow:#8bf5e4; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1.2rem;
  }
  .pixel{font-family:'Press Start 2P',monospace;}
  a.back{ color:var(--text-dim); text-decoration:none; font-size:0.85rem; align-self:flex-start; margin-bottom:1.5rem;}
  a.back:hover{ color:var(--cyan-glow); }
  h1{ font-size:1.1rem; color:var(--cyan-glow); margin-bottom:0.3rem; }
  .sub{ color:var(--text-dim); margin-bottom:1.5rem; text-align:center; }
  .search{ display:flex; gap:0.5rem; width:100%; max-width:420px; margin-bottom:1.5rem; }
  .search input{
    flex:1; padding:0.7rem 1rem; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
    background:var(--surface); color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:0.95rem;
  }
  .search button{
    background:var(--cyan); color:#161220; border:none; padding:0.7rem 1.2rem;
    border-radius:8px; font-weight:700; cursor:pointer;
  }
  #card{
    width:100%; max-width:420px; background:var(--card); border-radius:14px; padding:2rem;
    text-align:center; min-height:180px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  #city{ font-size:1.2rem; color:var(--cyan-glow); margin-bottom:0.3rem; }
  #temp{ font-size:2.8rem; font-weight:700; margin:0.4rem 0; }
  #desc{ color:var(--text-dim); margin-bottom:0.6rem; }
  #meta{ display:flex; gap:1.5rem; font-size:0.85rem; color:var(--text-dim); margin-top:0.8rem; }
  #meta span b{ color:var(--text); }
  .status{ color:var(--text-dim); font-size:0.9rem; }
  .error{ color:#f87171; }
</style>
</head>
<body>
<a class="back" href="../../index.html">← Back to hub</a>
<h1 class="pixel">WEATHER DASHBOARD</h1>
<p class="sub">Live weather, no API key required (powered by Open-Meteo).</p>
<div class="search">
  <input id="city-input" type="text" placeholder="Enter a city…" value="London">
  <button onclick="lookup()">Search</button>
</div>
<div id="card"><div class="status">Loading default city…</div></div>

<script>
const WEATHER_CODES = {
  0:"Clear sky", 1:"Mainly clear", 2:"Partly cloudy", 3:"Overcast",
  45:"Fog", 48:"Depositing rime fog",
  51:"Light drizzle", 53:"Drizzle", 55:"Dense drizzle",
  61:"Slight rain", 63:"Rain", 65:"Heavy rain",
  71:"Slight snow", 73:"Snow", 75:"Heavy snow",
  80:"Rain showers", 81:"Rain showers", 82:"Violent rain showers",
  95:"Thunderstorm", 96:"Thunderstorm w/ hail", 99:"Thunderstorm w/ heavy hail"
};

const cardEl = document.getElementById('card');
const inputEl = document.getElementById('city-input');

async function lookup(){
  const query = inputEl.value.trim();
  if(!query){ return; }
  cardEl.innerHTML = '<div class="status">Searching…</div>';
  try{
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1`);
    const geo = await geoRes.json();
    if(!geo.results || !geo.results.length){
      cardEl.innerHTML = '<div class="status error">City not found — try a different spelling.</div>';
      return;
    }
    const { latitude, longitude, name, country } = geo.results[0];
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
    const w = await wRes.json();
    const cw = w.current_weather;
    const desc = WEATHER_CODES[cw.weathercode] || "Unknown conditions";
    cardEl.innerHTML = `
      <div id="city">${name}, ${country}</div>
      <div id="temp">${Math.round(cw.temperature)}°C</div>
      <div id="desc">${desc}</div>
      <div id="meta">
        <span>Wind: <b>${Math.round(cw.windspeed)} km/h</b></span>
        <span>Updated: <b>${new Date(cw.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</b></span>
      </div>
    `;
  } catch(err){
    cardEl.innerHTML = '<div class="status error">Something went wrong — check your connection and try again.</div>';
  }
}

inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') lookup(); });
lookup();
</script>
</body>
</html>
