<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Planner — Pick a Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#161220; --surface:#221c30; --card:#2a2338; --text:#f7f1e8; --text-dim:#a89bb5; --cyan:#5eead4; --cyan-glow:#8bf5e4; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; }
  .pixel{font-family:'Press Start 2P',monospace;}
  .wrap{ max-width:820px; margin:0 auto; padding:1.5rem; }
  a.back{ color:var(--text-dim); text-decoration:none; font-size:0.85rem; }
  a.back:hover{ color:var(--cyan-glow); }
  h1{ font-size:1.4rem; color:var(--cyan-glow); margin:1rem 0 0.3rem; }
  .sub{ color:var(--text-dim); margin-bottom:1.5rem; }
  #search{
    width:100%; padding:0.8rem 1rem; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
    background:var(--surface); color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:0.95rem;
    margin-bottom:1rem;
  }
  .filters{ display:flex; gap:0.6rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  .filters button{
    background:var(--card); color:var(--text-dim); border:1px solid rgba(255,255,255,0.08);
    padding:0.4rem 0.9rem; border-radius:20px; font-size:0.8rem; cursor:pointer;
  }
  .filters button.active{ background:var(--cyan); color:#161220; border-color:var(--cyan); font-weight:700; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:1rem; }
  .card{
    background:var(--card); border-radius:10px; padding:1.2rem; position:relative;
    border:1px solid rgba(255,255,255,0.06);
  }
  .card h3{ font-size:1rem; margin-bottom:0.4rem; padding-right:2rem; }
  .card .time{ font-size:0.75rem; color:var(--cyan); margin-bottom:0.6rem; }
  .card ul{ color:var(--text-dim); font-size:0.82rem; padding-left:1.1rem; margin-bottom:0.6rem; }
  .card .steps{ color:var(--text-dim); font-size:0.82rem; }
  .fav{
    position:absolute; top:1rem; right:1rem; background:none; border:none;
    font-size:1.2rem; cursor:pointer; color:var(--text-dim);
  }
  .fav.active{ color:#ffd166; }
  .empty{ color:var(--text-dim); text-align:center; padding:2rem; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../../index.html">← Back to hub</a>
  <h1 class="pixel" style="font-size:1rem;">RECIPE PLANNER</h1>
  <p class="sub">Search, filter, and star your favorites — favorites are saved in this browser.</p>
  <input id="search" type="text" placeholder="Search by name or ingredient…">
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const RECIPES = [
  { name:"Garlic Butter Pasta", time:"20 min", tags:["dinner","quick"],
    ingredients:["Spaghetti","Butter","Garlic","Parmesan","Parsley"],
    steps:"Boil pasta. Melt butter, sauté garlic, toss pasta in, top with parmesan and parsley." },
  { name:"Overnight Oats", time:"5 min + rest", tags:["breakfast","quick"],
    ingredients:["Rolled oats","Milk","Yogurt","Honey","Berries"],
    steps:"Combine oats, milk, yogurt, honey in a jar. Refrigerate overnight. Top with berries." },
  { name:"Chickpea Curry", time:"30 min", tags:["dinner","vegetarian"],
    ingredients:["Chickpeas","Onion","Tomato","Coconut milk","Curry spices"],
    steps:"Sauté onion, add spices and tomato, simmer, stir in chickpeas and coconut milk." },
  { name:"Avocado Toast", time:"10 min", tags:["breakfast","quick"],
    ingredients:["Bread","Avocado","Lemon","Chili flakes","Salt"],
    steps:"Toast bread. Mash avocado with lemon and salt, spread, top with chili flakes." },
  { name:"Sheet Pan Veggies & Chicken", time:"35 min", tags:["dinner"],
    ingredients:["Chicken thighs","Broccoli","Bell pepper","Olive oil","Paprika"],
    steps:"Toss everything in oil and paprika, roast at 425°F (220°C) for 30 minutes." },
  { name:"Greek Salad", time:"15 min", tags:["lunch","vegetarian","quick"],
    ingredients:["Cucumber","Tomato","Red onion","Feta","Olives","Olive oil"],
    steps:"Chop vegetables, combine with feta and olives, dress with olive oil and oregano." },
];

const ALL_TAGS = ["all", ...new Set(RECIPES.flatMap(r => r.tags))];
let favorites = JSON.parse(localStorage.getItem('recipe-favs') || '[]');
let activeTag = 'all';

const filtersEl = document.getElementById('filters');
const gridEl = document.getElementById('grid');
const searchEl = document.getElementById('search');

ALL_TAGS.forEach(tag => {
  const b = document.createElement('button');
  b.textContent = tag;
  if(tag === activeTag) b.classList.add('active');
  b.onclick = () => { activeTag = tag; render(); };
  filtersEl.appendChild(b);
});

function toggleFav(name){
  if(favorites.includes(name)) favorites = favorites.filter(f => f !== name);
  else favorites.push(name);
  localStorage.setItem('recipe-favs', JSON.stringify(favorites));
  render();
}

function render(){
  [...filtersEl.children].forEach(b => b.classList.toggle('active', b.textContent === activeTag));
  const q = searchEl.value.trim().toLowerCase();
  const filtered = RECIPES.filter(r => {
    const matchesTag = activeTag === 'all' || r.tags.includes(activeTag);
    const matchesQuery = !q || r.name.toLowerCase().includes(q) || r.ingredients.some(i => i.toLowerCase().includes(q));
    return matchesTag && matchesQuery;
  });

  gridEl.innerHTML = filtered.length ? filtered.map(r => `
    <div class="card">
      <button class="fav ${favorites.includes(r.name) ? 'active' : ''}" onclick="toggleFav('${r.name.replace(/'/g,"\\'")}')">★</button>
      <h3>${r.name}</h3>
      <div class="time">${r.time}</div>
      <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
      <div class="steps">${r.steps}</div>
    </div>
  `).join('') : '<div class="empty">No recipes match — try a different search or filter.</div>';
}

searchEl.addEventListener('input', render);
render();
</script>
</body>
</html>
